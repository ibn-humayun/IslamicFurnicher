name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages project create islamicfurnicher --production-branch main || true
          npx wrangler pages deploy dist --project-name=islamicfurnicher --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: cfut_OIPKlle815jzyc0LuyNxSZO9bbpc9tBEtzebhRb5ea0d85ab
          CLOUDFLARE_ACCOUNT_ID: a07121307aad920d9450bed6f8004922
